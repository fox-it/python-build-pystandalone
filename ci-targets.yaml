# Describes the targets that the CI system will build and test on.

darwin:
  aarch64-apple-darwin:
    arch: aarch64
    python_versions:
      - "3.10"
      - "3.11"
      - "3.12"
      - "3.13"
      - "3.14"
      - "3.15"
    build_options:
      - pgo+lto

  x86_64-apple-darwin:
    arch: x86_64
    python_versions:
      - "3.10"
      - "3.11"
      - "3.12"
      - "3.13"
      - "3.14"
      - "3.15"
    build_options:
      - pgo+lto
    run: true

linux:
  aarch64-unknown-linux-gnu:
    arch: aarch64
    libc: gnu
    python_versions:
      - "3.10"
      - "3.11"
      - "3.12"
      - "3.13"
      - "3.14"
      - "3.15"
    build_options:
      - pgo+lto

  x86_64-unknown-linux-gnu:
    arch: x86_64
    libc: gnu
    python_versions:
      - "3.10"
      - "3.11"
      - "3.12"
      - "3.13"
      - "3.14"
      - "3.15"
    build_options:
      - pgo+lto
    run: true

  x86_64-unknown-linux-musl:
    arch: x86_64
    libc: musl
    python_versions:
      - "3.10"
      - "3.11"
      - "3.12"
      - "3.13"
      - "3.14"
      - "3.15"
    build_options:
      - lto+static
    run: true

  aarch64-unknown-linux-musl:
    arch: aarch64
    libc: musl
    python_versions:
      - "3.10"
      - "3.11"
      - "3.12"
      - "3.13"
      - "3.14"
      - "3.15"
    build_options:
      - lto
    run: true

windows:
  i686-pc-windows-msvc:
    arch: x86
    vcvars: vcvars32.bat
    python_versions:
      - "3.10"
      - "3.11"
      - "3.12"
      - "3.13"
      - "3.14"
      - "3.15"
    vs_version: "2022"
    build_options:
      - pgo

  x86_64-pc-windows-msvc:
    arch: x86_64
    vcvars: vcvars64.bat
    python_versions:
      - "3.10"
      - "3.11"
      - "3.12"
      - "3.13"
      - "3.14"
      - "3.15"
    vs_version: "2022"
    vs_version_override_conditional:
      vs_version: "2026"
      minimum-python-version: "3.15"
    build_options:
      - pgo

  aarch64-pc-windows-msvc:
    arch: aarch64
    vcvars: vcvarsamd64_arm64.bat
    python_versions:
      # On 3.10, `_tkinter` is failing to be included in the build
      # - "3.10"
      - "3.11"
      - "3.12"
      - "3.13"
      - "3.14"
      - "3.15"
    vs_version: "2022"
    build_options:
      - pgo
